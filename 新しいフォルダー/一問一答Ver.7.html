<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一問一答 Pro+</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">


<style>
:root{
--bg:#f8fafc; --card:#fff; --p:#2563eb;
--g:#10b981; --r:#ef4444; --t:#1e293b;
}

body{
margin:0; font-family:sans-serif;
background:var(--bg);
display:flex; justify-content:center; align-items:center;
min-height:100dvh;
color:var(--t);
}

.container{
width:92%; max-width:520px;
background:var(--card);
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
position:relative;
}

.badge{
position:absolute; top:10px; right:15px;
font-size:11px; background:#eee; padding:3px 8px;
border-radius:999px;
}

.stats{
font-size:12px;
display:flex; justify-content:space-between;
margin-bottom:10px;
}

.timer{ color:#f59e0b; font-weight:bold; }

.category{
font-size:12px;
color:var(--p);
margin-bottom:6px;
}

.question{
font-size:18px;
line-height:1.6;
min-height:120px;
border-top:1px solid #eee;
padding-top:12px;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.true{ background:var(--g); color:#fff; }
.false{ background:var(--r); color:#fff; }

.next{
margin-top:10px;
width:100%;
background:var(--p);
color:#fff;
display:none;
}

.box{
display:none;
margin-top:10px;
padding:12px;
border-radius:10px;
}

.correct{ background:#dcfce7; }
.incorrect{ background:#fee2e2; }

.small{
font-size:12px;
margin-top:6px;
color:#475569;
}

.extra{
margin-top:10px;
font-size:12px;
display:flex;
justify-content:space-between;
}

.reset{
margin-top:10px;
width:100%;
background:#111827;
color:#fff;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="badge" id="mode">ALL</div>

<div class="stats">
<div>正答率 <span id="acc">0</span>%</div>
<div>連続 <span id="streak">0</span></div>
<div class="timer"><span id="time">0.0</span>s</div>
</div>

<div class="category" id="cat"></div>
<div class="question" id="q">loading...</div>

<div class="btns">
<button class="true" onclick="answer('〇')">〇</button>
<button class="false" onclick="answer('×')">×</button>
</div>

<div class="box" id="box">
<div id="res"></div>
<div class="small" id="exp"></div>
</div>

<button class="next" id="next" onclick="next()">次へ</button>

<div class="extra">
<span>復習: <span id="wrongCount">0</span></span>
<span onclick="toggleReview()" style="text-decoration:underline;cursor:pointer;">切替</span>
</div>

<button class="reset" onclick="resetAll()">完全リセット</button>

</div>

<script>

const data = [
        { id: 1, cat: "不動産登記法", q: "土地の表題部所有者又は所有権の登記名義人は、地図に表示された当該土地の区画に誤りがあることを発見した場合には、その誤りを発見した日から1月以内に地図訂正の申出をしなければならない。", a: "×", ex: "地図訂正の申出は所有者の任意であり、申請義務（1月以内）はありません。" },
        { id: 2, cat: "調査士法", q: "法務大臣は、土地家屋調査士法人に対する懲戒処分として、当該法人の業務の一部に限った業務の停止を命ずることはできない。", a: "×", ex: "法務大臣は、業務の全部または「一部」の停止を命じることができます。" },
        { id: 3, cat: "不動産登記法", q: "建物の表題登記がない建物について、所有権保存の登記を申請する場合、申請人はその申請と同時に建物の表題登記の申請をしなければならない。", a: "×", ex: "表題登記がない状態で保存登記は申請できません。まず表題登記を完了させる必要があります。" },
        { id: 4, cat: "民法", q: "共有者の一人が死亡して相続人がないときは、その持分は他の共有者に帰属する。", a: "〇", ex: "民法第255条の規定により、相続人がいない共有持分は他の共有者に帰属します。" },
        { id: 5, cat: "不動産登記法", q: "地目変更の登記は、所有権の登記名義人のほか、抵当権の登記名義人も代位して申請することができる。", a: "〇", ex: "地目変更などの表示に関する登記は、権利の行使に影響するため債権者代位が認められます。" },
        { id: 6, cat: "不動産登記規則 第28条", q: "保存期間が永久と定められているもの。土地に関する閉鎖登記記録。", a: "×", ex: "土地が合筆されたりコンピュータ化されたりして「閉鎖」された段階で「閉鎖登記記録」という扱いになり、第4号の規定によって保存期間が50年間に限定されます。" },
        { id: 7, cat: "不動産登記規則 第28条", q: "保存期間が永久と定められているもの。閉鎖した建物所在図。", a: "〇", ex: "建物図面: 建物の形状や平面図。閉鎖後は30年保存。" },
        { id: 8, cat: "不動産登記規則 第28条", q: "保存期間が永久と定められているもの。建物の合併の登記の申請情報。", a: "×"},
        { id: 9, cat: "不動産登記規則 第235条第1項第1号", q: "保存期間が永久と定められているもの。筆界特定書に記載された情報。", a: "〇", ex: "筆界特定手続記録 (その他)	30年間" },
        { id: 10, cat: "不動産登記規則 第28条", q: "保存期間が永久と定められているもの。閉鎖した地積測量図。", a: "×", ex: "現役の地積測量図: 永久保存" },
        { id: 11, q: "私人が所有する土地について、市町村が代位による土地の表題登記を嘱託する場合には、当該土地についての被代位者が所有権を有することを証する情報を提供することを要する。", a: "〇"},
        { id: 12, q: "市町村から登記の嘱託の委任を受けた代理人が当該登記の嘱託をする場合には、嘱託情報と併せて提供すべき市町村長が作成した委任状は、作成後 3 月以内のものであることを要しない。", a: "〇"},
        { id: 13, q: "市町村がその所有する建物の表題登記の嘱託をする場合には、当該建物の所有権を有することを証する情報を提供することを要する。", a: "×"},
        { id: 14, q: "私人が所有権の登記名義人である土地の一部が河川法の定める河川区域内の土地となった場合において、河川管理者がその旨の登記を登記所に嘱託するときは、河川管理者は、当該土地の所有権の登記名義人に代わって、当該土地の分筆の登記を登記所に嘱託することができる。", a: "〇"},
        { id: 15, q: "市町村が、当該市町村を所有権の登記名義人とする土地についての合筆の登記の嘱託をする場合には、その嘱託情報に登記識別情報の通知を希望する旨の情報が含まれていたとしても、登記識別情報は通知されない。", a: "×"},
        { id: 16, q: "Ｂが、株式会社Ａから登記識別情報の提供を受けて、登記識別情報提供様式を作成して電子申請の方法により本件登記申請をする場合には、登記識別情報の暗号化についての特別の授権は不要である。", a: "×"},
        { id: 17, q: "株式会社Ａの代表取締役が令和 7 年 4 月 1 日に替わったときであっても、Ｂは、同月 2 日に株式会社Ａを代理して本件登記申請をすることができる。", a: "〇"},
        { id: 18, q: "Ｂが株式会社Ａの許諾を得て復代理人を選任したときであっても、Ｂは、株式会社Ａを代理して本件登記申請をすることができる。", a: "〇"},
        { id: 19, q: "Ｂが令和 7 年 4 月 1 日に死亡した場合には、Ｂの相続人である土地家屋調査士Ｃは、Ｂの地位を承継したものとして、株式会社Ａを代理して本件登記申請をすることができる。", a: "×"},
        { id: 20, q: "本件登記申請の際に納付した登録免許税に過誤納があった場合には、Ｂは、本件委任状に基づいて、株式会社Ａを代理してその還付金を受領することができる。", a: "×"},
        { id: 21, q: "表題部所有者である株式会社Ａを株式会社Ｂが吸収合併した場合には、株式会社Ｂは、表題部所有者の名称についての変更の登記の申請をすることができる。", a: "×"},
        { id: 22, q: "表題部所有者である特例有限会社Ａが株式会社Ａに商号変更をした場合には、株式会社Ａは、表題部所有者の名称についての変更の登記の申請をすることができる。", a: "〇"},
        { id: 23, q: "表題部所有者として登記されているＡの住所についての更正の登記と、Ａの氏についての変更の登記とは、一の申請情報によって申請をすることができない。", a: "×"},
        { id: 24, q: "表題部所有者であるＡ及びＢの持分が誤って登記されている場合において、当該持分についての更正の登記の申請をするときは、Ａは、Ｂの承諾を証する情報を提供して、単独で当該申請をすることができる。", a: "〇"},
        { id: 25, q: "表題部所有者の住所が登記記録上の住所から数回にわたって変更している場合には、表題部所有者は直ちに現在の住所に変更する旨の表題部所有者の住所についての変更の登記の申請をすることができる。", a: "〇"},
        { id: 26, q: "土地の所有権の登記名義人の氏名が登記記録上の氏名と異なる場合であっても、当該氏名についての変更があったことを証する市町村長が職務上作成した情報を提供することにより、当該土地に係る地積測量図の訂正の申出をすることができる。", a: "〇"},
        { id: 27, q: "書面を提出する方法により地積に関する更正の登記を申請した場合に、作成者が署名した地積測量図には、その作成者の押印は要しない。", a: "〇"},
        { id: 28, q: "筆界点に永続性のある石杭又は金属標があるときは、地積測量図にその表示を記録しなければならない。", a: "〇"},
        { id: 29, q: "分筆の登記を申請する際に添付する地積測量図には、分筆前の土地が広大であって、分筆後の土地の一方がわずかであるときは、地積の記録を便宜省略することができる。", a: "×"},
        { id: 30, q: "地積測量図の縮尺がその土地について作成すべき土地所在図の縮尺と同一であって、当該地積測量図によって土地の所在を明確に表示することができるときであっても、当該地積測量図をもって土地所在図を兼ねることはできない。", a: "×"},
        { id: 31, q: "建物の所在の変更の登記を申請する場合には、建物図面及び各階平面図を提供しなければならない。", a: "×"},
        { id: 32, q: "甲土地上にのみ存する区分建物について、当該区分建物の存しない乙土地を当該区分建物の規約敷地とする新たな規約を設定したことによる表題部の変更の登記を申請する場合には、建物図面を提供しなければならない。", a: "×"},
        { id: 33, q: "仮換地上に建築された建物の表題登記を申請する場合に添付する建物図面には、敷地の形状として、当該建物の存する仮換地の形状を実線で図示しなければならない。", a: "〇"},
        { id: 34, q: "一棟の建物の 1 階に存する 1 階建ての甲区分建物と、甲区分建物の真上の階に存し甲区分建物と上下に接する 1 階建ての乙区分建物とを合併して、 1 個の区分建物とする合併の登記を申請する場合には、各階平面図を提供することを要しない。", a: "×"},
        { id: 35, q: "共用部分である旨の登記がある建物について共用部分である旨を定めた規約を廃止したことによる当該建物の表題登記を申請する場合には、建物図面及び各階平面図を提供することを要しない。", a: "〇"},
        { id: 36, q: "Ａ及びＢが所有権の登記名義人である甲土地から乙土地を分筆する分筆の登記の申請がされた場合において、分筆後の甲土地をＡが単独で所有し、乙土地をＢが単独で所有する旨の共有物分割の判決があったことを証する情報が提供されたときは、甲土地の登記記録にはＡが単独所有者として登記され、乙土地の登記記録にはＢが単独所有者として登記される。", a: "×"},
        { id: 37, q: "甲土地に地上権の設定の登記がされており、かつ、当該地上権を目的とする抵当権の設定の登記がされている場合において、甲土地から乙土地を分筆する分筆の登記をするときに、登記官が当該地上権を分筆後の甲土地について消滅させる旨の登記をするためには、当該地上権の登記名義人が当該地上権を分筆後の甲土地について消滅させることを承諾したことを証する情報に加えて、当該抵当権の登記名義人が承諾したことを証する情報が提供されることが必要である。", a: "〇"},
        { id: 38, q: "所有権移転請求権保全の仮登記がされている甲土地から乙土地を分筆する分筆の登記をする場合において、分筆後の乙土地について当該仮登記の登記名義人が権利の消滅を承諾したことを証する情報が提供されたときは、分筆後の乙土地の登記記録には当該仮登記は転写されない。", a: "〇"},
        { id: 39, q: "抵当権の設定の登記がされている甲土地から乙土地を分筆する分筆の登記の申請を書面を提出する方法によりする場合において、当該抵当権を分筆後の乙土地について消滅させることを当該抵当権の登記名義人が承諾したことを証する情報を提供するときは、当該情報に添付すべき当該登記名義人の印鑑に関する証明書は、作成後 3 月以内のものでなければならない。", a: "×"},
        { id: 40, q: "地上権の設定の登記がされている甲土地から乙土地を分筆する分筆の登記を申請する場合において、当該地上権の存続期間が満了しているときは、乙土地の登記記録には地上権の設定の登記は転写されない。", a: "×"},
        { id: 41, q: "区分建物である建物の登記記録の表題部のうち、一棟の建物の表題部には、当該一棟の建物の種類が記録される。", a: "×"},
        { id: 42, q: "登記官は、表題登記のある建物について共用部分である旨の登記をするときは、当該建物の種類に関する登記事項を抹消する記号を記録しなければならない。", a: "×"},
        { id: 43, q: "区分建物でない 5 階建ての 1 個の建物について、 1 階は食品の販売店、 2 階と 3 階は衣類の販売店、 4 階はゲームセンター、 5 階は映画館として利用されている場合には、当該建物の種類は「多目的ビル」と定めることができる。", a: "×"},
        { id: 44, q: "学校教育法の適用されない学習塾として利用されている建物の種類は、「教習所」と定めることができる。", a: "〇"},
        { id: 45, q: "各種油類の販売及び給油の目的の用に供するために建築されたガソリンスタンドの建物の種類は、「給油所」と定めることができる。", a: "〇"},
        { id: 46, q: "敷地権である旨の登記がされている土地については、当該敷地権である旨の登記を抹消した後でなければ、地目を宅地以外の地目に変更する登記の申請をすることができない。", a: "×"},
        { id: 47, q: "区分建物とその敷地権の目的となる土地の各所有権の登記名義人の住所が一致していない場合であっても、各登記名義人の同一性を証する情報を添付情報とすれば、登記名義人の住所の変更又は更正の登記をすることなく、敷地権の発生を原因とする区分建物の表題部の変更の登記の申請をすることができる。", a: "×"},
        { id: 48, q: "隣接する 2 筆の土地のいずれにも敷地権である旨の登記がされている場合には、当該 2 筆の土地についての合筆の登記の申請をすることができる。", a: "×"},
        { id: 49, q: "甲建物及び乙建物がいずれも区分建物であり、甲建物についてのみ敷地権の登記がある場合であっても、建物の合併の登記の申請をすることができる。", a: "〇"},
        { id: 50, q: "一棟の建物に属する区分建物全部についての表題登記を申請する場合において、そのうちの一部の区分建物についてのみ専有部分とその専有部分に係る敷地利用権の分離処分を可能とする規約が設定されているときは、他の区分建物についてのみ敷地権に関する事項を申請情報とする当該登記の申請をすることができる。", a: "〇"},
        { id: 51, q: "表題登記のみがされた 2 個の建物を買い受けた者が、その両建物を合体して 1 個の建物とした後に、合体前の各建物の所有権の登記名義人となった場合には、その者は、合体後の建物についての建物の表題登記及び合体前の建物についての建物の表題部の登記の抹消を申請することができる。", a: "〇"},
        { id: 52, q: "電子情報処理組織を使用する方法により建物の表題登記を申請する場合において、書面に記載された建築基準法に基づく確認済証をスキャナにより電磁的記録に記録したものを添付情報とするときは、当該電磁的記録は、当該電磁的記録を作成した者による電子署名を要しない。", a: "×"},
        { id: 53, q: "区分建物以外の表題登記がない建物の所有権を取得した者が、表題登記を申請しないまま死亡した場合において、その相続人が当該建物についての表題登記の申請をするときは、被相続人を表題部所有者としなければならない。", a: "×"},
        { id: 54, q: "土地の賃借人が当該土地上に新築した建物の表題登記を申請する場合には、当該土地の借地権を有することを証する情報を提供しなければならない。", a: "×"},
        { id: 55, q: "建物の表題登記を申請する場合には、表題部所有者となる者の住所を証する情報として、当該表題部所有者となる者に係る印鑑に関する証明書を提供することができる。", a: "〇"},
        { id: 56, q: "抵当権の登記がある建物について、共用部分である旨の登記を申請する場合には、当該抵当権の登記名義人の承諾を証する当該登記名義人が作成した情報又は当該抵当権の登記名義人に対抗することができる裁判があったことを証する情報を提供しなければならない。", a: "〇"},
        { id: 57, q: "表題登記のある建物について、当該建物を共用部分とする旨の規約が定められた場合には、当該建物の表題部所有者は、当該規約が定められた日から 1 月以内に、共用部分である旨の登記を申請しなければならない。", a: "×"},
        { id: 58, q: "共用部分である旨の登記のある甲建物に附属建物がある場合において、当該附属建物を甲建物から分割して乙建物とする建物の分割の登記を申請するときは、甲建物の所有者を証する情報を提供しなければならない。", a: "〇"},
        { id: 59, q: "甲建物について共用部分である旨の登記を申請する場合において、甲建物が数人の共有に属するときは、甲建物の共有者全員で申請しなければならない。", a: "×"},
        { id: 60, q: "甲区分建物について共用部分である旨の登記を申請する場合において、甲区分建物の属する一棟の建物以外の一棟の建物に属する区分建物の区分所有者が、甲区分建物を共用すべき区分所有者であるときは、当該区分所有者の氏名又は名称を申請情報の内容として提供しなければならない。", a: "×"},
        { id: 61, q: "対象土地の共有者の一人が筆界特定の申請人である場合には、申請人でない対象土地の他の共有者は、筆界特定登記官に対し、対象土地の筆界について意見又は資料を提出することができる。", a: "〇"},
        { id: 62, q: "甲土地を所有するＡが、隣接する乙土地を所有するＢに対し、Ａが所有する範囲について所有権の確認の訴えを提起し、その判決が確定した場合には、Ａは、甲土地及び乙土地を対象土地として筆界特定の申請をすることができない。", a: "×"},
        { id: 63, q: "筆界特定の関係人は、筆界が特定されるまでの間は、当該筆界特定の手続において作成された調書及び提出された資料の閲覧を請求することができない。", a: "×"},
        { id: 64, q: "筆界特定の申請人は、書面申請の方法により筆界特定の申請をする際に対象土地の所有権を有することを証する書面として売買契約書の原本を添付したときは、当該売買契約書の原本の還付を請求することができる。", a: "〇"},
        { id: 65, q: "甲土地と乙土地の筆界について既に甲土地の所有者を申請人とする筆界特定登記官による筆界特定がされていた場合であっても、当該筆界特定登記官が当該申請人の叔父であったという事情が判明したときは、乙土地の所有者は、改めて甲土地を対象土地として筆界特定の申請をすることができる。", a: "〇"},
        { id: 66, q: "登記官の処分に不服がある場合であっても、当該処分があったことを知った日の翌日から起算して 1 月を経過したときは、審査請求をすることができない。", a: "×"},
        { id: 67, q: "法務局又は地方法務局の長が審査請求につき裁決したときは、裁決書の謄本を審査請求人及び登記官に交付する。", a: "〇"},
        { id: 68, q: "筆界特定登記官による筆界特定がされた場合には、申請人は、筆界特定の結果に不服があることを理由とする審査請求をすることができる。", a: "×"},
        { id: 69, q: "甲土地について土地の地積の更正の登記がされた場合において、甲土地と隣接する乙土地の所有者は、筆界に異議があることを理由として、甲土地の地積の更正の登記の取消しを求める審査請求をすることができる。", a: "×"},
        { id: 70, q: "Ａが所有権の登記名義人である土地の分筆の登記の申請が却下された場合において、Ａがその却下処分につき審査請求をしたときは、当該土地の抵当権の登記名義人であるＢは、参加人として当該審査請求に参加することができない。", a: "〇"},
        { id: 71, q: "法定相続情報一覧図の保管の申出を行う場合には、申出人が提出すべき法定相続情報一覧図には被相続人の本籍地の記載を要する。", a: "×"},
        { id: 72, q: "法定相続情報一覧図の写しの再交付の申出は、当該法定相続情報一覧図の保存期間が満了するまで行うことができる。", a: "〇"},
        { id: 73, q: "法定相続情報一覧図の保管の申出の際に添付書面として提出された相続人の戸籍の全部事項証明書は、返却されない。", a: "×"},
        { id: 74, q: "法定相続情報一覧図の保管の申出は、申出人を所有権の登記名義人とする不動産の所在地を管轄する登記所にすることができる。", a: "×"},
        { id: 75, q: "土地の表示に関する登記を申請する場合において、相続があったことを証する情報として当該相続に係る法定相続情報一覧図を識別するための法定相続情報番号を提供するときは、法定相続情報一覧図の写しを提供することを要しない。", a: "〇"},
        { id: 76, q: " 1 個の建物の表題部所有者の住所の更正の登記の申請をする場合には、納付すべき登録免許税の額は1,000円となる。", a: "×"},
        { id: 77, q: "私人を所有権の登記名義人とする土地の一部を買い受けた地方公共団体が、私人に代位して当該土地を 2 筆にする分筆の登記の嘱託をする場合には、登録免許税は課されない。", a: "〇"},
        { id: 78, q: "いずれも所有権の登記のある 3 筆の土地を合筆する旨の登記をした後に、錯誤を原因として当該登記を抹消する旨の登記の申請をする場合には、納付すべき登録免許税の額は3,000円となる。", a: "×"},
        { id: 79, q: "5 筆の土地の所有権を敷地権とする所有権の登記のある 1 個の区分建物を 2 個の区分建物とする再区分の登記の申請をする場合には、納付すべき登録免許税の額は2,000円となる。", a: "〇"},
        { id: 80, q: "所有権の登記がある附属建物付きの甲建物から当該附属建物を分割して、これを乙建物の附属建物としようとする場合において、建物の分割の登記と建物の合併の登記を一の申請情報によって申請するときは、納付すべき登録免許税の額は3,000円となる。", a: "×"},
        { id: 81, q: "土地家屋調査士法人は、定款を変更したときは、法定の期間内に、変更に係る事項を、主たる事務所の所在地を管轄する法務局又は地方法務局に届け出なければならない。", a: "×"},
        { id: 82, q: "土地家屋調査士は、置いていた補助者を置かなくなったときは、遅滞なく、その旨を所属の土地家屋調査士会に届け出なければならない。", a: "〇"},
        { id: 83, q: "土地家屋調査士は、日本土地家屋調査士会連合会に届け出ることにより、複数の都道府県に事務所を設置することができる。", a: "×"},
        { id: 84, q: "土地家屋調査士法人の社員である土地家屋調査士は、その登録を取り消された場合には、当該法人を当然に脱退する。", a: "〇"},
        { id: 85, q: "土地家屋調査士が心身の故障により業務を行うことができないときは、日本土地家屋調査士会連合会は、その登録を取り消さなければならない。", a: "×"},
        { id: 86, q: "土地の表題登記を申請する場合において、申請人である当該土地の所有者が住民基本台帳法に規定する住民票コードを提供したときは、申請情報と併せて住所を証する情報を提供することを要しない。", a: "〇"},
        { id: 87, q: "表題登記がない甲土地を所有するＡが死亡し、その相続人がＢである場合において、Ｂの住所が記載されている法定相続情報一覧図の写しを提供して、Ｂを表題部所有者とする甲土地の表題登記を申請するときであっても、Ｂの住所を証する情報を提供しなければならない。", a: "×"},
        { id: 88, q: "複数の者が共有する土地を敷地とする建物の表題登記を申請する場合には、表題部所有者となる者の所有権を有することを証する情報として提供する当該建物の敷地所有者による証明情報は、当該敷地の持分の過半数を有する者によるものでなければならない。", a: "×"},
        { id: 89, q: "土地家屋調査士が代理人として電子申請の方法により合同会社を所有者とする建物の表題登記を申請する場合において、当該合同会社による電子署名が付された代理権限を証する情報を提供したときであっても、添付情報として、当該合同会社の会社法人等番号を提供しなければならない。", a: "〇"},
        { id: 90, q: "区分建物の表題登記を申請する場合において、規約により専有部分と敷地利用権との分離処分を可能とする旨を定めたことにより地上権が当該区分建物の敷地権とならないときであっても、その敷地利用権が地上権であり、かつ、当該区分建物が属する一棟の建物の敷地について登記された地上権の登記名義人が当該区分建物の所有者であるときは、添付情報として、当該規約の定めを証する情報を提供することを要しない。", a: "×"},
        { id: 91, q: "調査士報告方式（土地家屋調査士又は土地家屋調査士法人が代理人として電子申請の方法により表示に関する登記を申請する場合において、不動産登記令第 13 条第 1 項に基づき添付情報が提供されたときは、原則として、添付情報の基となった書面の提示を求めない取扱い）の対象となるものか。地役権の登記がある承役地の分筆の登記を申請する場合において、地役権設定の範囲が分筆後の土地の一部であるときに提供する当該地役権設定の範囲を証する書面", a: "×"},
        { id: 92, q: "調査士報告方式（土地家屋調査士又は土地家屋調査士法人が代理人として電子申請の方法により表示に関する登記を申請する場合において、不動産登記令第 13 条第 1 項に基づき添付情報が提供されたときは、原則として、添付情報の基となった書面の提示を求めない取扱い）の対象となるものか。建物の滅失の登記を申請する場合に代理人の権限を証する情報として提供する委任状", a: "〇"},
        { id: 93, q: "調査士報告方式（土地家屋調査士又は土地家屋調査士法人が代理人として電子申請の方法により表示に関する登記を申請する場合において、不動産登記令第 13 条第 1 項に基づき添付情報が提供されたときは、原則として、添付情報の基となった書面の提示を求めない取扱い）の対象となるものか。建物の表題登記を申請する場合に所有権を有することを証する情報として提供する工事施工会社作成の工事完了引渡証明書", a: "〇"},
        { id: 94, q: "調査士報告方式（土地家屋調査士又は土地家屋調査士法人が代理人として電子申請の方法により表示に関する登記を申請する場合において、不動産登記令第 13 条第 1 項に基づき添付情報が提供されたときは、原則として、添付情報の基となった書面の提示を求めない取扱い）の対象となるものか。表題部所有者の更正の登記を申請する場合に表題部所有者の承諾を証する情報として提供する承諾書", a: "×"},
        { id: 95, q: "調査士報告方式（土地家屋調査士又は土地家屋調査士法人が代理人として電子申請の方法により表示に関する登記を申請する場合において、不動産登記令第 13 条第 1 項に基づき添付情報が提供されたときは、原則として、添付情報の基となった書面の提示を求めない取扱い）の対象となるものか。抵当権の登記がある甲建物と抵当権の登記がない乙建物が合体して 1 個の建物となった場合において、合体後の建物についての建物の表題登記及び合体前の建物についての建物の表題部の登記の抹消を申請するときに当該抵当権の登記名義人が当該抵当権を合体後の建物について消滅させることについて承諾したことを証する情報として提供する当該抵当権の登記名義人作成の承諾書", a: "×"},
        { id: 96, q: "地図を作成するための測量は、近傍に基本三角点等が存しない場合には、近傍の恒久的な地物を基礎として行うことができる。", a: "×"},
        { id: 97, q: "地図に表示された隣接する 2 筆の土地の区画に誤りがあることによる地図の訂正の申出をする場合において、当該 2 筆の土地が同一の登記所の管轄区域内にあるときは、一の地図訂正申出情報により申出をすることができる。", a: "×"},
        { id: 98, q: "新たに地図が備え付けられたことによって従前の地図に準ずる図面が閉鎖された場合であっても、当該地図に準ずる図面の保存期間は、永久とされる。", a: "〇"},
        { id: 99, q: "地図に表示された土地の区画に誤りがあることによる地図の訂正の申出をする場合において、その誤りを閉鎖された地図に準ずる図面により確認することができるときは、地図に表示された土地の区画に誤りがあることを証する情報として、当該地図に準ずる図面を特定する情報を提供すれば足りる。", a: "〇"},
        { id: 100, q: "土地の分筆の登記の申請をする際に添付情報として提供した地積測量図の分筆線に誤りがあり、その誤った分筆線で当該分筆の登記がされた場合には、当該分筆線が誤りであることを証する情報を提供して、地図の訂正の申出により分筆線を訂正することができる。", a: "×"},
        { id: 101, q: "甲土地の登記記録の地積と申請情報の内容とする地積との差が公差の範囲内である場合であっても、甲土地の地積に関する更正の登記を申請することができる。", a: "〇"},
        { id: 102, q: "地殻変動によって一筆の土地の一部が常時海面下に没するようになった場合には、当該一筆の土地の地積が減少したことによる地積に関する更正の登記を申請することができる。", a: "×"},
        { id: 103, q: "土地の地積が減少することとなる地積に関する更正の登記を申請する場合において、当該土地に抵当権の登記があるときであっても、当該抵当権の登記名義人が地積を更正することについて承諾したことを証する情報を提供することを要しない。", a: "〇"},
        { id: 104, q: "土地の地積が増加することとなる地積に関する更正の登記を申請する場合には、当該土地に隣接する土地の所有権の登記名義人が地積を更正することについて承諾したことを証する情報を提供しなければならない。", a: "×"},
        { id: 105, q: "土地の登記記録の地積に誤りがあることが判明した後に当該土地の所有権の登記名義人となった者は、その者に係る所有権の登記があった日から 1 か月以内に、当該土地の地積に関する更正の登記を申請しなければならない。", a: "×"},
        { id: 106, q: "要役地についてする地役権の登記がある土地について、その所有権の登記名義人であり、地役権者である株式会社が分筆の登記を申請する場合において、当該地役権を分筆後のいずれかの土地について消滅させることを証する書面を添付情報として提供し、当該株式会社の会社法人等番号を申請情報として提供したときは、当該株式会社の印鑑に関する証明書の提供を要しない。", a: "〇"},
        { id: 107, q: "Ａが表題部所有者である甲土地とＡが所有権の登記名義人である乙土地とが同一の登記所の管轄区域内にある場合であっても、甲土地の分筆の登記と乙土地の分筆の登記とを、一の申請情報によって申請することはできない。", a: "×"},
        { id: 108, q: "甲土地の所有権の登記名義人であるＡが死亡し、その唯一の相続人であるＢが甲土地の分筆の登記を申請する場合において、その相続に関して法定相続情報一覧図の写しを添付情報として提供したときは、Ｂは、Ａの相続人である旨を申請情報の内容とすることを要しない。", a: "×"},
        { id: 109, q: "株式会社が所有権の登記名義人である甲土地について、地方公共団体が代位により甲土地から乙土地を分筆する分筆の登記を嘱託する場合には、登録免許税は課されない。", a: "〇"},
        { id: 110, q: "Ａ、Ｂ及びＣが所有権の登記名義人であり、持分がそれぞれ ３ 分の １ である甲土地から乙土地を分筆する分筆の登記を申請する場合には、Ａ、Ｂ及びＣの全員でしなければならない。", a: "×"},
        { id: 111, q: "甲土地及び乙土地いずれも所有権の登記名義人がＡ及びＢである場合において、甲土地についてＡの持分を 5 分の 3 とし、Ｂの持分を 5 分の 2 とする登記がされており、乙土地についてＡの持分を 5 分の 2 とし、Ｂの持分を 5 分の 3 とする登記がされているときは、乙土地を甲土地に合筆する合筆の登記を申請することができない。", a: "〇"},
        { id: 112, q: "登記記録の地目がいずれも同一である甲土地及び乙土地について、その現況の地目が甲土地と乙土地とでそれぞれ異なる場合であっても、乙土地を甲土地に合筆する合筆の登記を申請することができる。", a: "×"},
        { id: 113, q: "地方公共団体が所有する土地について、当該地方公共団体が合筆の登記を嘱託する場合には、登記識別情報を提供することを要しない。", a: "〇"},
        { id: 114, q: "Ａ及びＢが表題部所有者として登記されている甲土地に、Ａ及びＢを所有権の登記名義人とする乙土地を合筆する合筆の登記を申請することができる。", a: "×"},
        { id: 115, q: "承役地についてする地役権の登記がある甲土地に地役権の登記がない乙土地を合筆する合筆の登記を申請する場合には、地役権設定の範囲を申請情報の内容としなければならない。", a: "〇"},
        { id: 116, q: "書面を提出する方法により地役権図面を提供する場合には、当該地役権図面に地役権者が署名し、又は記名押印しなければならない。", a: "〇"},
        { id: 117, q: "承役地についてする地役権の登記がある土地の分筆の登記を申請する場合において、その添付情報として地積測量図と併せて地役権図面を提供するときは、当該地役権図面の縮尺を当該地積測量図の縮尺と同一にしなければならない。", a: "×"},
        { id: 118, q: "承役地についてする地役権の登記がある甲土地に地役権図面が備え付けられている場合において、甲土地から乙土地を分筆する分筆の登記を申請し、地役権設定の範囲が分筆後の甲土地の一部のみとなるときは、当該申請の申請情報と併せて地役権図面を提供することを要しない。", a: "〇"},
        { id: 119, q: "承役地についてする地役権の登記がある甲土地に地役権図面が備え付けられている場合において、新たな地役権図面を添付情報として提供して甲土地から乙土地を分筆する分筆の登記を申請し、当該登記がされたときは、従前の地役権図面は、閉鎖される。", a: "×"},
        { id: 120, q: "地役権図面には、要役地の所在地番を記録しなければならない。", a: "×"},
        { id: 121, q: "Ａを所有権の登記名義人とする甲建物の附属建物について、ＡＢ間で売買契約が締結され、Ｂが当該附属建物の所有権を取得した場合には、Ｂは、Ａに代位して甲建物の分割の登記を申請することができる。", a: "〇"},
        { id: 122, q: "Ａを所有権の登記名義人とする甲土地及び乙土地を合筆してＢに売却する旨の売買契約がＡＢ間で締結された場合には、Ｂは、甲土地及び乙土地について売買を原因とする所有権の移転の登記を申請する前提として、Ａに代位して土地の合筆の登記を申請することができる。", a: "×"},
        { id: 123, q: "区分建物の所有権の原始取得者であるＡが当該区分建物をＢに売却し、その後、Ｂが当該区分建物をＣに売却した場合において、Ａが当該区分建物の表題登記を申請しないときであっても、Ｃは、Ａに代位して当該区分建物の表題登記を申請することができない。", a: "×"},
        { id: 124, q: "Ａを所有権の登記名義人とする甲土地の一部に地役権を設定したＢは、Ａに代位して甲土地の分筆の登記を申請することができない。", a: "〇"},
        { id: 125, q: "Ａ及びＢが所有権の登記名義人である甲建物が増築されたことにより、甲建物の床面積が変更された場合において、Ｂが甲建物の床面積の変更の登記の申請に応じないときは、Ａは、Ｂに代位して当該申請をすることができる。", a: "×"},
        { id: 126, q: "建物の認定 上屋を有する駅のホーム内にある売店は、基礎工事が施されてホームに定着しており、周壁により外気と分断されている場合には、建物として登記することができる。", a: "×"},
        { id: 127, q: "建物の認定 鋼管製の脚柱により土地に定着し、鉄板により外気と分断されている家畜の飼料の貯蔵所であるサイロは、建物として登記することができる。", a: "〇"},
        { id: 128, q: "建物の認定 廃車となった鉄道車両は、基礎工事が施されて土地に定着しており、店舗の用途に供されている場合には、建物として登記することができる。", a: "〇"},
        { id: 129, q: "建物の認定 開閉式円形ドーム屋根を有する野球場は、当該屋根の開閉可能部分の下にある観客席及びフィールド部分を除き、建物として登記することができる。", a: "×"},
        { id: 130, q: "建物の認定 円柱状の形をした大型の石油備蓄用の石油タンクは、建物として登記することができる。", a: "×"},
        { id: 131, q: "表題登記がある建物の所在する行政区画の名称に変更があった場合には、当該建物の表題部の不動産所在事項の変更の登記を申請しなければならない。", a: "×"},
        { id: 132, q: "区分建物が属する一棟の建物の規約敷地とされた土地の地番は、当該区分建物の一棟の建物の表示欄中の所在欄に記録される。", a: "×"},
        { id: 133, q: "仮換地が指定された土地の上に建物が新築された場合において、当該建物の表題登記を申請するときは、申請情報である建物の所在として、当該建物が現に存する土地の地番を提供しなければならない。", a: "〇"},
        { id: 134, q: "永久的な施設である桟橋上に建物が建築された場合において、当該建物の表題部に不動産所在事項を記録するときは、その建物から最も近い土地の地番を用いて「何番地先」のように記録する。", a: "〇"},
        { id: 135, q: "附属建物がある区分建物の表題登記を申請する場合において、当該附属建物が区分建物であって、主である建物と同一の一棟の建物に属するときは、当該附属建物の所在地番を申請情報の内容とすることを要しない。", a: "〇"},
        { id: 136, q: "近接して建築されたが、効用上一体として利用される状態にない甲建物及び乙建物について、甲建物を主である建物とし、乙建物を附属建物とする建物の表題登記の申請は、することができない。", a: "〇"},
        { id: 137, q: "甲建物を乙建物の附属建物とする建物の合併の登記を申請する場合には、添付情報として各階平面図を提供する必要はない。", a: "×"},
        { id: 138, q: "所有権の登記がある甲建物の附属建物を新築する場合における不動産工事の先取特権の保存の登記がされた後に、当該附属建物の建築が完了したときは、甲建物の所有権の登記名義人は、遅滞なく、当該附属建物の新築による建物の表題部の変更の登記を申請しなければならない。", a: "〇"},
        { id: 139, q: "附属建物がある建物の表題登記を申請する場合において、附属建物の新築の日が主である建物の新築の日と同一であるときは、附属建物の新築の日を申請情報の内容とすることを要しない。", a: "〇"},
        { id: 140, q: "建物の附属建物を新築した場合において、建物の表題部の変更の登記を申請するときは、変更後の建物図面を添付情報として提供することを要しない。", a: "〇"},
        { id: 141, q: "表題部に建物の名称が記録されている区分建物でない建物の滅失の登記を申請する場合において、当該建物の名称を申請情報の内容とするときは、当該建物の構造及び床面積を申請情報の内容とすることを要しない。", a: "×"},
        { id: 142, q: "表題部所有者の氏名についての変更の登記の登記原因は、「氏名変更」である。", a: "〇"},
        { id: 143, q: "建物の表題部所有者として誤ってＡが登記されているが、当該建物の真実の所有者がＢである場合には、Ａは、当該建物について、表題部所有者の更正の登記を申請することができる。", a: "×"},
        { id: 144, q: "2 階建ての建物を階層的に区分して 1 階部分を甲区分建物とし、2 階部分を乙区分建物とする区分建物の表題登記を申請する場合には、甲区分建物及び乙区分建物のいずれの専有部分の建物の表示欄中の構造欄にも屋根の種類が記録されない。", a: "〇"},
        { id: 145, q: "共用部分である旨の登記がされており、複数の者が共有する建物の表題部の更正の登記は、当該建物の共有者全員が申請しなければならない。", a: "×"},
        { id: 146, q: "自然人であるＡを表題部所有者とする甲建物と乙建物について、Ａが乙建物を甲建物の附属建物とする建物の合併の登記を申請する場合には、Ａの印鑑に関する証明書を提供することを要する。", a: "×"},
        { id: 147, q: "甲建物及び乙建物のいずれにもＡを登記名義人とする所有権の移転請求権の仮登記がされている場合には、乙建物を甲建物の附属建物とする合併の登記を申請することができない。", a: "〇"},
        { id: 148, q: "甲建物及び乙建物のいずれにも共用部分である旨の登記がある場合には、乙建物を甲建物の附属建物とする合併の登記を申請することができない。", a: "〇"},
        { id: 149, q: "一棟の建物として登記されている区分建物でない建物の中間部分を取り壊して、相互に接続しない 2 棟の建物とした場合において、いずれの建物も主である建物とするときに申請する表題部の変更の登記と建物の分割の登記とは、一の申請情報により申請することができない。", a: "×"},
        { id: 150, q: "抵当権の登記がある建物の分割の登記を申請する場合において、当該抵当権者が、分割後の全ての建物について当該抵当権を消滅させることを承諾したことを証する情報を提供したときは、分割後の全ての建物について当該抵当権が消滅した旨が記録される。", a: "×"},
        { id: 151, q: "抵当権の登記がある建物の滅失の登記を申請する場合には、当該抵当権の登記名義人の承諾を証する情報を提供しなければならない。", a: "×"},
        { id: 152, q: "甲建物の所有権の登記名義人であるＡが死亡した後に甲建物が滅失した場合には、Ａの相続人であるＢは、甲建物について相続を原因とする所有権の移転の登記がされた後に、甲建物の滅失の登記を申請しなければならない。", a: "×"},
        { id: 153, q: "所有者がいずれも異なる複数の区分建物が属する一棟の建物が滅失した場合には、一棟の建物の滅失の登記の申請は、区分建物の所有者の一人ですることができる。", a: "〇"},
        { id: 154, q: "所有権の移転の仮登記がある建物が滅失した場合には、当該仮登記の登記名義人は、当該建物の滅失の登記を申請することができる。", a: "×"},
        { id: 155, q: "Ａが所有権の登記名義人である甲建物の全部を取り壊し、甲建物の材料を用いて甲建物と同じ種類、構造及び床面積の建物を別の土地に建築した場合には、Ａは、甲建物の滅失の登記を申請しなければならない。", a: "〇"},
        { id: 156, q: "甲区分建物が属する一棟の建物の法定敷地として登記された土地について、当該一棟の建物とは別の一棟の建物の規約敷地とする敷地権の表示に関する登記の申請は、することができない。", a: "×"},
        { id: 157, q: "区分建物の表題登記の申請をする場合において、当該区分建物が属する一棟の建物とは別の表題登記のない一棟の建物に属する区分建物を附属建物とするときは、当該附属建物とする区分建物が属する一棟の建物に属する他の区分建物の表題登記の申請と併せてしなければならない。", a: "〇"},
        { id: 158, q: "甲土地及び乙土地が法定敷地として登記されている敷地権付き区分建物について、当該区分建物が属する一棟の建物の一部が取り壊されたことにより、甲土地上に当該一棟の建物が存しないこととなった場合には、甲土地について敷地権であった権利が敷地権でない権利になったことによる区分建物の表題部の変更の登記を申請しなければならない。", a: "×"},
        { id: 159, q: "甲区分建物と乙区分建物からなる一棟の建物のうち甲区分建物のみが滅失した場合には、甲区分建物の滅失の登記の申請は、乙区分建物の表題部の変更の登記の申請と併せてしなければならない。", a: "×"},
        { id: 160, q: "甲区分建物及び乙区分建物からなる一棟の建物について、甲区分建物が増築されたことにより、甲区分建物の床面積の変更の登記と当該一棟の建物の床面積の変更の登記とが申請された場合には、乙区分建物の所有権の登記名義人は、乙区分建物について、当該一棟の建物の床面積の変更の登記を申請することを要しない。", a: "〇"},
        { id: 161, q: "表題登記がある甲土地の所有者は、甲土地及び甲土地と 1 点のみで接している乙土地を対象土地として筆界特定の申請をすることができない。", a: "〇"},
        { id: 162, q: "表題登記がない甲土地の所有者が、甲土地とこれに隣接する表題登記がある乙土地との間の筆界について筆界特定の申請をする場合には、甲土地の所有者は、甲土地の所有権を有することを証する情報を提供しなければならない。", a: "〇"},
        { id: 163, q: "表題登記がある甲土地に隣接する表題登記のある乙土地の一部の所有権を時効取得した者は、当該乙土地の一部が甲土地と隣接していない場合には、甲土地を対象土地として筆界特定の申請をすることができない。", a: "×"},
        { id: 164, q: "表題登記がない水路とこれに隣接する表題登記がない道路を対象土地とする筆界特定の申請は、することができない。", a: "〇"},
        { id: 165, q: "筆界特定の申請に係る筆界について民事訴訟の手続により筆界の確定を求める訴えに係る訴訟が係属している場合には、当該筆界について筆界特定の申請をすることができない。", a: "×"},
        { id: 166, q: "土地家屋調査士は、正当な事由がある場合でなくても、筆界特定の手続についての代理業務に関する依頼を拒むことができる。", a: "〇"},
        { id: 167, q: "土地家屋調査士となる資格を有する者が日本土地家屋調査士会連合会に登録申請書を提出するときは、事務所を設けようとする地を管轄する法務局又は地方法務局を経由して提出しなければならない。", a: "×"},
        { id: 168, q: "土地家屋調査士は、正当な事由がある場合であっても、業務上取り扱った事件について知ることのできた秘密を他に漏らしてはならない。", a: "×"},
        { id: 169, q: "土地家屋調査士は、土地の表示に関する登記について必要な測量の業務の依頼を受けた場合において、やむを得ない事由があるときは、補助者に当該業務を取り扱わせることができる。", a: "×"},
        { id: 170, q: "土地家屋調査士法人は、社員となろうとする土地家屋調査士が １ 人であっても、設立することができる。", a: "〇"},
        { id: 171, q: "建物の表題登記の申請がされた場合には、登記官は、当該建物の所有者に関する事項について調査することができる。", a: "〇"},
        { id: 172, q: "不動産の表示に関する登記の申請が申請人となるべき者以外の者によってされていると疑うに足りる相当な理由がある場合において、当該申請を却下すべきときであっても、登記官は、当該申請の申請人に対し、その申請の権限の有無を調査しなければならない。", a: "×"},
        { id: 173, q: "土地の表示に関する登記についての実地調査を行う場合には、登記官は、日出から日没までの間に限り、当該実地調査を行うことができる。", a: "〇"},
        { id: 174, q: "不動産の表示に関する登記の申請があった場合には、登記官は、登記所の職員に当該不動産の実地調査を行わせることはできない。", a: "×"},
        { id: 175, q: "不動産の表示に関する登記についての実地調査を行う場合には、登記官は、当該不動産の所有者その他の関係者に対し、文書の提示を求めることができる。", a: "〇"},
        { id: 176, q: "土地区画整理事業により従前の 1 個の土地に照応して 1 個の換地を定めた換地処分が行われた場合には、当該換地について表題部の登記記録が新たに作成される。", a: "×"},
        { id: 177, q: "建物を新築する場合の不動産工事の先取特権の保存の登記がされている建物の建築が完了した場合において、当該建物の表題登記を申請し、当該登記がされるときは、当該建物の表題部の登記記録が新たに作成される。", a: "×"},
        { id: 178, q: "甲土地の一部を分筆して、これを乙土地に合筆しようとする場合において、分筆の登記及び合筆の登記を一の申請情報により申請し、その旨の登記がされるときは、甲土地から分筆し、乙土地に合筆した土地の表題部の登記記録は作成されない。", a: "〇"},
        { id: 179, q: "表題登記のある甲建物を隣接する他の土地上に解体移転した場合において、解体移転後の建物の表題部に関する登記を申請したときは、甲建物の表題部の登記記録に解体及び移転した旨が記録される。", a: "×"},
        { id: 180, q: "区分建物として表題登記のある甲建物及び乙建物からなる一棟の建物の中間部分を取り壊し、甲建物及び乙建物が区分建物でないそれぞれ別の建物となった場合において、甲建物及び乙建物の表題部に関する登記を申請し、その旨の登記がされるときは、甲建物及び乙建物の表題部の登記記録が新たに作成される。", a: "〇"},
        { id: 181, q: "地図を作成するための測量は、基本測量の成果である電子基準点を基礎として行うことができる。", a: "〇"},
        { id: 182, q: "電磁的記録に記録された地図には、基本三角点等の位置のみならず、その名称及びその座標値を記録しなければならない。", a: "×"},
        { id: 183, q: "土地家屋調査士が作成した測量成果である実測図であって、国土調査法第 19 条第5 項の指定を受け、登記所に送付されるものについては、不適当とする特別の事情がある場合を除き、これを地図として登記所に備え付けることができる。", a: "〇"},
        { id: 184, q: "新たに地図が備え付けられたことにより、電磁的記録に記録されている地図に準ずる図面が閉鎖された場合には、当該地図に準ずる図面の情報の内容を証明した書面の交付を請求することはできない。", a: "×"},
        { id: 185, q: "地図に表示された土地の区画に誤りがあることによる地図の訂正の申出をする場合において、当該申出の際に添付する地積測量図に記録された地積と当該土地の登記記録上の地積との差が公差の範囲内であっても、当該申出は、地積に関する更正の登記の申請と併せてしなければならない。", a: "×"},
        { id: 186, q: "公有水面埋立法に基づく埋立工事が竣工した土地の表題登記を申請する場合には、所有権を証する情報として公有水面埋立法の規定による竣功認可書を提供することができる。", a: "〇"},
        { id: 187, q: "国が所有する表題登記がない土地の売払いを受けた者が、当該土地の表題登記を申請する場合には、当該表題登記の登記原因を「国有財産売払」として申請しなければならない。", a: "×"},
        { id: 188, q: "Ａが表題登記がない土地の所有権を原始取得した場合において、Ａが当該土地の表題登記を申請する前に、当該土地をＢに売却したときであっても、Ａは、当該土地の表題登記を申請することができる。", a: "×"},
        { id: 189, q: "土地区画整理事業区域内で仮換地が指定された表題登記がない従前の土地について換地処分による登記を申請する場合において、必要があるときは、土地区画整理事業を施行する者は、当該従前の土地の所有者に代位して、土地の表題登記を申請することができる。", a: "〇"},
        { id: 190, q: "地方公共団体の所有する土地について、当該地方公共団体が土地の表題登記を嘱託する場合には、所有権を証する情報の提供を省略することができる。", a: "〇"},
        { id: 191, q: "学校教育法の規定により設置された幼稚園の園舎の敷地である土地の地目は、学校用地とする。", a: "〇"},
        { id: 192, q: "高圧線の下にある建物の敷地である土地の地目は、雑種地とする。", a: "×"},
        { id: 193, q: "水力発電のためにのみ使用される排水路の地目は、雑種地とする", a: "〇"},
        { id: 194, q: "牧場地域内にある牧畜のために使用する牧草栽培地である土地の地目は、畑とする。", a: "×"},
        { id: 195, q: "人の遺体又は遺骨を埋葬する規模の大きな墓地の地目は、霊園とする。", a: "×"},
        { id: 196, q: "抵当権の設定の登記がされた土地について分筆の登記がされた後は、錯誤を原因とする当該分筆の登記の抹消をすることはできない。", a: "×"},
        { id: 197, q: "抵当権の設定の登記がされた甲土地から乙土地を分筆する分筆の登記をする場合には、分筆後の甲土地及び乙土地の２筆の土地について、抵当権者が当該抵当権を消滅させることを承諾したことを証する情報が提供されたとしても、登記官は、分筆後の甲土地及び乙土地に係る当該抵当権が消滅した旨の登記をすることはできない。", a: "〇"},
        { id: 198, q: "甲土地の所有権の登記名義人であるＡが死亡し、その相続人がＢ及びＣである場合において、ＢＣ間で、Ｂが甲土地の所有権を単独で取得することを内容とする遺産分割協議が成立したときであっても、Ｂは、甲土地の分筆の登記を申請することはできない。", a: "×"},
        { id: 199, q: "地方公共団体及び私人が所有権の登記名義人である土地について、当該私人が分筆の登記を申請する場合には、登録免許税は課されない。", a: "×"},
        { id: 200, q: "甲土地から乙土地を分筆する分筆の登記をする場合において、甲土地に筆界特定がされた旨の記録があるときは、当該記録は、乙土地の登記記録に転写される。", a: "〇"},
        { id: 201, q: "調査士：　建物の表題登記を申請する場合を考えてみましょう。申請人が建物の敷地を所有していない場合には、当該申請人に当該敷地を利用することについて正当な権原があることを証する情報を提供しなければなりませんか。補助者：　はい。当該敷地を利用することについての正当な権原があることを証する情報を添付する必要があります。", a: "×"},
        { id: 202, q: "調査士：　建物の表題登記を申請する際に、所有権を証する情報として工事施工会社作成に係る工事完了引渡証明書を提供し、これに当該会社の印鑑に関する証明書を添付した場合には、当該印鑑に関する証明書は、作成後3か月以内のものでなければなりませんか。補助者：　いいえ。当該印鑑に関する証明書は、作成後3か月以内のものである必要はありません。", a: "〇"},
        { id: 203, q: "調査士：　Ａ株式会社の支店の支配人として登記された者が、Ａ株式会社が所有する建物の表題登記の申請に係る申請人となる場合には、Ａ株式会社の会社法人等番号と併せて当該支配人の権限を証する情報を提供しなければなりませんか。補助者：　いいえ。支配人の権限を証する情報を提供する必要はありません。", a: "〇"},
        { id: 204, q: "建物の表題登記を申請する場合には、申請人の住所を証する情報は、作成後3か月以内のものでなければなりませんか。補助者：　いいえ。当該住所を証する情報は、作成後3か月以内のものである必要はありません。", a: "〇"},
        { id: 205, q: "２棟の建物が合体して１個の建物になったことにより、合体後の建物についての建物の表題登記及び合体前の建物についての建物の表題部の登記の抹消を申請する場合において、合体前の各建物について所有権の登記があるときは、当該各建物の所有権の登記名義人の住所を証する情報を提供しなければなりませんか。補助者：　いいえ。登記記録から所有権者の住所が明らかなので、住所を証する情報は必要ありません。", a: "×"},
        { id: 206, q: "建物図面及び各階平面図には、申請人及び作成者の住所を記録しなければならない。", a: "×"},
        { id: 207, q: "書面を提出する方法により地下のみの附属建物がある建物の建物図面を提供する場合には、附属建物の地下 1 階の形状を朱書きする。", a: "〇"},
        { id: 208, q: "各階平面図の床面積の計算において、不算入とすべき出窓を算入した誤りがある場合には、表題部所有者若しくは所有権の登記名義人又はこれらの相続人その他の一般承継人は、各階平面図の訂正の申出をすることができる。", a: "×"},
        { id: 209, q: "建物の表題登記がされ、既に建物図面及び各階平面図が登記所に提出されている建物について、附属建物の滅失による表題部の変更の登記を申請する場合には、建物図面及び各階平面図の提供を省略することができる。", a: "〇"},
        { id: 210, q: "2 階建の建物の各階平面図を作成する場合において、2 階の階層を表示するときは、1 階の位置を点線をもって表示する。", a: "〇"},
        { id: 211, q: "公衆用道路上に屋根覆いを施したアーケード付街路のうち、その周辺が店舗に囲まれており、かつ、アーケードを有する部分に限り、建物として登記することができる。", a: "×"},
        { id: 212, q: "上部が倉庫として利用されている寺院の山門であって、当該倉庫部分が周壁を有して外気と分断されているものであっても、建物として登記することはできない。", a: "×"},
        { id: 213, q: "主たる部分の構成材料が鉄骨であり、屋根及び周壁が永続性のある膜構造の塩化ビニールの特殊シートで覆われた建造物は、建物として登記することができる。", a: "〇"},
        { id: 214, q: "最上部が屋根及び周壁を有する展望台となっており、当該展望台の下部が鉄筋コンクリートを主たる構成材料として建築された階段室となっている場合には、当該展望台を建物として登記することができる。", a: "〇"},
        { id: 215, q: "屋根及び外壁があり、内部に車を格納する回転式のパーキング機械が設置されているタワー状の立体駐車場は、建物として登記することはできない。", a: "×"},
        { id: 216, q: "建物の一部が 2 階から最上階まで吹抜けとなっている場合には、1 階から最上階までの各階の吹抜け構造の部分は、建物の床面積に算入しない。", a: "×"},
        { id: 217, q: "区分建物でない鉄筋コンクリート造の建物について、壁の厚みが各階ごとに異なる場合には、各階ごとに壁の中心線で囲まれた部分の水平投影面積により床面積を算出する。", a: "〇"},
        { id: 218, q: "区分建物を内壁で囲まれた部分により床面積を算出する場合において、当該区分建物が鉄筋コンクリート造であって、柱と壁を兼ねている構造の部分が柱状に凸凹しているときは、その柱状に凸凹している部分は、専有部分の範囲から除外して床面積を算出する。", a: "×"},
        { id: 219, q: "ビル内の地下において、1 方向のみを壁構造とし、他の 3 方向は鉄製のシャッターで仕切られており、営業中はシャッターを上げ、閉店後はシャッターを閉める構造の店舗部分は、区分建物の専有部分の床面積に算入しない。", a: "×"},
        { id: 220, q: "機械室、冷却装置室及び屋上に出入りするための階段室が設置されている天井高 2 .5 メートルの塔屋について、当該塔屋の一部が、管理事務所及び倉庫として使用されている場合には、管理事務所及び倉庫として使用されていない部分も含めた当該塔屋全体を建物の床面積に算入する。", a: "〇"},
        { id: 221, q: "株式会社Ａ及び株式会社Ｂが区分建物である甲建物の所有権の原始取得者である場合において、甲建物の表題登記を申請する前に、株式会社Ｃが株式会社Ｂを吸収合併したときは、吸収合併存続会社である株式会社Ｃは、表題部所有者を株式会社Ａ及び株式会社Ｃとする甲建物の表題登記を申請することができる。", a: "×"},
        { id: 222, q: "建物の表題登記の申請情報として建物の所在を提供する場合において、当該建物の登記記録の所在に「甲郡乙町大字丙字丁」と記録されており、地番区域が大字である丙と定められているときであっても、小字である丁の記載を省略することはできない。", a: "〇"},
        { id: 223, q: "区分建物でない建物の表題登記の申請をし、建物の名称を申請情報として提供して登記が完了した場合には、当該建物の名称は、当該建物の登記記録の表題部の建物の名称欄に記録される。", a: "×"},
        { id: 224, q: "数個の区分建物が属する一棟の建物を新築した場合には、その全ての区分建物について、一の申請情報により建物の表題登記を申請しなければならない。", a: "×"},
        { id: 225, q: "区分建物である表題登記のない建物の所有権の原始取得者が複数いる場合において、当該区分建物の表題登記を申請するときは、その原始取得者のうちの一人から当該申請をすることができる。", a: "〇"},
        { id: 226, q: "甲建物の附属建物として登記されている 2 棟の建物について、1 棟を主である建物とし、残りの 1 棟をその附属建物とする場合には、甲建物から当該 2 棟の建物を乙建物と丙建物にそれぞれ分割する建物の分割の登記がされた後に、丙建物を乙建物の附属建物とする建物の合併の登記を申請しなければならない。", a: "×"},
        { id: 227, q: "Ａが所有する甲建物の附属建物として登記されている建物について処分禁止の仮処分命令を得た債権者であるＢは、当該仮処分命令の正本を代位原因を証する情報として提供して、Ａに代位して、当該建物の分割の登記を申請することができる。", a: "〇"},
        { id: 228, q: "建物の分割の登記を申請する場合において提供する建物図面及び各階平面図には、分割後の各建物を表示し、これに符号を付さなければならない。", a: "〇"},
        { id: 229, q: "甲建物に 1 から 3 までの符号が付された附属建物が 3 棟ある場合において、符号 2の附属建物を分割したときは、符号 3 の附属建物の符号は、符号 2 に変更される。", a: "×"},
        { id: 230, q: "家屋番号 5 番である甲建物の附属建物を分割して乙建物とする場合には、甲建物の登記記録の附属建物の表示欄の原因及びその日付欄に、「 5 番の 1、5 番の 2 に分割」と記録される。", a: "×"},
        { id: 231, q: "いずれも表題登記がない甲建物及び乙建物が合体して 1 個の建物となった場合において、合体による登記等を申請するときは、当該申請と併せて合体前の甲建物及び乙建物の表題登記の申請をしなければならない。", a: "×"},
        { id: 232, q: "いずれも区分建物でない甲建物の附属建物と乙建物とが合体した場合には、甲建物の分割の登記をすることなく、合体による登記等を申請することができる。", a: "×"},
        { id: 233, q: "Ａが所有権の登記名義人である甲建物及び乙建物が合体して丙建物となった後に、Ａが死亡し、その相続人がＢ及びＣである場合には、Ｂは、単独で、合体による登記等を申請することができる。", a: "〇"},
        { id: 234, q: "Ａが表題部所有者として記録されている区分建物でない甲建物とＢが表題部所有者として記録されている区分建物でない乙建物とが増築により合体し、合体後の建物が一棟の建物に属する 2 個の区分建物としての要件を備えた場合において、当該合体後の建物について、Ａ及びＢが区分所有の意思を示したときであっても、合体による登記等を申請しなければならない。", a: "×"},
        { id: 235, q: "合体前の建物に記録されている所有権の登記名義人の住所が現在の住所と異なる場合には、当該所有権の登記名義人の住所の変更の登記を申請することなく、当該建物について合体による登記等を申請することができる。", a: "〇"},
        { id: 236, q: "表題登記のある建物について共用部分とする旨の規約を定めた場合には、当該建物の表題部所有者は、当該規約を定めた日から 1 か月以内に、共用部分である旨の登記を申請しなければならない。", a: "×"},
        { id: 237, q: "所有権の登記がない建物について共用部分である旨の登記がされる場合には、当該建物の表題部所有者に関する登記事項を抹消する記号が記録される。", a: "〇"},
        { id: 238, q: "共用部分である旨の登記がある建物について、当該建物の種類を倉庫から車庫に変更した場合には、規約により共用部分の所有者と定められた者は、当該建物の表題部の変更の登記を申請しなければならない。", a: "〇"},
        { id: 239, q: "団地共用部分である旨の登記がある区分建物でない建物について、建物の区分の登記を申請する場合には、当該建物の所有者を証する情報を添付情報として提供しなければならない。", a: "〇"},
        { id: 240, q: "団地共用部分を共用すべき者の所有する区分建物でない建物について、団地共用部分である旨の登記を申請する場合において、当該建物の不動産番号を申請情報の内容とするときであっても、当該建物の家屋番号を申請情報の内容としなければならない。", a: "×"},
        { id: 241, q: "筆界調査委員が実地調査を行うために他人の土地に立ち入る場合において、当該土地の占有者がいないときは、あらかじめ土地の表題部所有者又は所有権登記名義人に通知をしなければならない。", a: "×"},
        { id: 242, q: "筆界調査委員は、対象土地の筆界特定のために必要な事実の調査を終了した場合には、申請人に対し、対象土地の筆界特定についての意見を提出しなければならない。", a: "×"},
        { id: 243, q: "対象土地の筆界特定をしたことにより対象土地の地積が算出できる場合には、筆界特定の内容を表示した図面に当該土地の地積が記載される。", a: "×"},
        { id: 244, q: "筆界調査委員が筆界特定のために必要な事実の調査をする場合には、筆界調査委員は、申請人及び関係人以外のその他の者からその知っている事実を聴取し又は資料の提出を求めることができる。", a: "〇"},
        { id: 245, q: "筆界特定の手続における測量に要する費用は、申請人が負担する。", a: "〇"},
        { id: 246, q: "委任を受けた土地家屋調査士が、法定相続情報一覧図の写しの交付の申出をする場合には、代理人の権限を証する書面として、委任状以外の書面を添付する必要はない。", a: "×"},
        { id: 247, q: "法定相続情報一覧図の保管の申出は、申出人の住所地を管轄する登記所に申出をすることができる。", a: "〇"},
        { id: 248, q: "法定相続情報一覧図の保管の申出をする際に申出書に添付する法定相続情報一覧図には、相続開始の時における同順位の相続人の住所を記載しなければならない。", a: "×"},
        { id: 249, q: "法定相続情報一覧図の保管の申出をするには、被相続人が不動産の表題部所有者又は所有権の登記名義人として登記されていることを要する。", a: "×"},
        { id: 250, q: "法定相続情報一覧図の写しの再交付の申出は、当該法定相続情報一覧図の保管の申出をした申出人のみがすることができる。", a: "〇"},
        { id: 251, q: "土地家屋調査士が死亡したときは、その相続人は、遅滞なく、その旨を日本土地家屋調査士会連合会に届け出なければならない。", a: "〇"},
        { id: 252, q: "土地家屋調査士が引き続き 2 年以上業務を行わないときは、日本土地家屋調査士会連合会は、その登録を取り消さなければならない。", a: "×"},
        { id: 253, q: "土地家屋調査士法人は、定款の定めによらなければ、社員のうち特に土地家屋調査士法人を代表すべきものを定めることができない。", a: "×"},
        { id: 254, q: "法務大臣は、土地家屋調査士又は土地家屋調査士法人について、戒告の処分をしたときには、遅滞なく、その旨を官報をもって公告しなければならない。", a: "〇"},
        { id: 255, q: "法務大臣は、土地家屋調査士法人に対する懲戒処分として、当該法人の業務の一部に限った業務の停止を命ずることはできない。", a: "×"},
        { id: 256, q: "錯誤による意思表示は、その錯誤が表意者の重大な過失によるものであった場合であっても、相手方が表意者に錯誤があることを重大な過失により知らなかったときは、取り消すことができる", a: "〇"},
        { id: 257, q: "第三者の強迫によって不動産を売却した者は、買主が強迫の事実を知らなかった場合には、当該不動産の売買の意思表示を取り消すことができない。", a: "×"},
        { id: 258, q: "買主の詐欺によって不動産を売却した者は、当該不動産の売買の意思表示を取り消す前に当該買主が詐欺の事実につき善意無過失の第三者に当該不動産を転売していた場合には、当該第三者への所有権の移転の登記がされていないときであっても、その取消しを当該第三者に対抗することができない。", a: "〇"},

let wrong = load("w",[]);
let stats = load("s",{c:0,t:0,streak:0,by:{}});

let pool = [];
let cur;
let timer;
let start;

let review=false;

function load(k,d){
try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}
}

function save(){
localStorage.setItem("w",JSON.stringify(wrong));
localStorage.setItem("s",JSON.stringify(stats));
}

function shuffle(){
pool=[...data].sort(()=>Math.random()-0.5);
}

function nextPool(){
if(pool.length===0) shuffle();
return pool.pop();
}

function startTimer(){
clearInterval(timer);
start=Date.now();
timer=setInterval(()=>{
document.getElementById("time").innerText=((Date.now()-start)/1000).toFixed(1);
},100);
}

function next(){

let list=review?data.filter(x=>wrong.includes(x.id)):data;

if(list.length===0) list=data;

cur=list[Math.floor(Math.random()*list.length)];

document.getElementById("q").innerText=cur.q;
document.getElementById("cat").innerText=cur.cat;

document.getElementById("box").style.display="none";
document.getElementById("next").style.display="none";

startTimer();
}

function answer(v){
clearInterval(timer);

stats.t++;

let ok=v===cur.a;

if(ok){
stats.c++;
stats.streak++;
wrong=wrong.filter(x=>x!==cur.id);
document.getElementById("box").className="box correct";
document.getElementById("res").innerText="正解";
}else{
stats.streak=0;
if(!wrong.includes(cur.id)) wrong.push(cur.id);
document.getElementById("box").className="box incorrect";
document.getElementById("res").innerText="不正解";
}

stats.by[cur.cat]=(stats.by[cur.cat]||{c:0,t:0});
stats.by[cur.cat].t++;
if(ok) stats.by[cur.cat].c++;

document.getElementById("exp").innerText=cur.ex;

save();
update();

document.getElementById("box").style.display="block";
document.getElementById("next").style.display="block";
}

function update(){
document.getElementById("acc").innerText=
stats.t?Math.round(stats.c/stats.t*100):0;

document.getElementById("streak").innerText=stats.streak;
document.getElementById("wrongCount").innerText=wrong.length;
}

function toggleReview(){
review=!review;
document.getElementById("mode").innerText=review?"REVIEW":"ALL";
next();
}

function resetAll(){
if(!confirm("完全リセットしますか？"))return;

localStorage.clear();

wrong=[];
stats={c:0,t:0,streak:0,by:{}};

update();
next();
}

update();
next();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
